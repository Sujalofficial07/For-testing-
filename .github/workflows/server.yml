name: Generate Server Files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Download SbRemake
        run: |
          wget -O SbRemake.jar https://github.com/CarsCupcake/SbRemake/releases/latest/download/SbRemake.jar

      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      - name: Start Server for 90 Seconds
        run: |
          timeout 90s java -Xmx2G -jar SbRemake.jar nogui || true

      - name: Zip Files
        run: zip -r server-files.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-files
          path: server-files.zip
          
