name: Generate Server Files

on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '25'

      - name: Download SbRemake Jar
        run: |
          wget https://github.com/CarsCupcake/SbRemake/releases/latest/download/SbRemake.jar

      - name: Accept EULA
        run: |
          echo "eula=true" > eula.txt

      - name: Start Server (wait 60 seconds)
        run: |
          timeout 60 java -Xmx2G -jar SbRemake.jar nogui || true

      - name: Zip Generated Files
        run: |
          zip -r server-files.zip .

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: server-files
          path: server-files.zip
          
