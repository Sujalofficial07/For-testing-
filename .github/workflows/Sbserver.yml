name: Generate Minecraft Server Files

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Show Java Version
        run: java -version

      - name: Download SbRemake Server
        run: |
          wget -O SbRemake.jar https://github.com/CarsCupcake/SbRemake/releases/latest/download/SbRemake.jar

      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      - name: Start Server (2 Minutes)
        run: |
          timeout 120s java -Xmx2G -jar SbRemake.jar nogui || true

      - name: Show Generated Files
        run: ls -la

      - name: Create ZIP of Server Files
        run: zip -r server-files.zip .

      - name: Upload Server Files
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-files
          path: server-files.zip
          
